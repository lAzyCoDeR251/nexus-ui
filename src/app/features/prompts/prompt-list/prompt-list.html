<div class="max-w-5xl mx-auto px-6 py-8">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">

    <h1 class="text-2xl font-semibold text-gray-900">
      Prompt Library
    </h1>

    <a routerLink="/create"
       class="inline-flex items-center justify-center bg-indigo-600 hover:bg-indigo-700
              text-white px-4 py-2 rounded-lg text-sm font-medium transition">
      + Add Prompt
    </a>

  </div>

  <!-- Loading -->
  <div *ngIf="loading; else content"
       class="text-center text-gray-500 py-10">
    <div class="inline-flex items-center gap-2">
      <div class="w-4 h-4 border-2 border-gray-300 border-t-indigo-600 rounded-full animate-spin"></div>
      Loading...
    </div>
  </div>

  <!-- Content -->
  <ng-template #content>

    <!-- Empty State -->
    <div *ngIf="prompts.length === 0"
         class="text-center text-gray-500 bg-white border border-gray-200 rounded-xl p-10">
      No prompts found
    </div>

    <!-- List -->
    <div class="space-y-4">

      <div *ngFor="let prompt of prompts"
           class="bg-white border border-gray-200 rounded-xl p-5
                  hover:shadow-md hover:border-gray-300 transition">

        <!-- Top Row -->
        <div class="flex justify-between items-start gap-4">

          <a [routerLink]="['/prompts', prompt.id]"
             class="text-lg font-semibold text-gray-900 hover:text-indigo-600 transition">
            {{ prompt.title }}
          </a>

          <span class="text-xs font-medium px-3 py-1 rounded-full whitespace-nowrap"
                [ngClass]="getColor(prompt.complexity)">
            {{ prompt.complexity }}
          </span>

        </div>

        <!-- Bottom Meta -->
        <div class="mt-2 text-sm text-gray-500">
          Created {{ prompt.created_at }}
        </div>

      </div>

    </div>

  </ng-template>

</div>
