<div class="min-h-screen bg-gray-100 px-6 py-10">

  <div class="max-w-3xl mx-auto">

    <!-- Back -->
    <a routerLink="/prompts"
       class="inline-flex items-center gap-2 text-sm text-gray-600 hover:text-indigo-600 mb-6 transition">
      ← Back
    </a>

    <!-- Loading -->
    <div *ngIf="loading"
         class="flex items-center gap-2 text-gray-500 bg-white border border-gray-200 rounded-xl p-6">
      <div class="w-4 h-4 border-2 border-gray-300 border-t-indigo-600 rounded-full animate-spin"></div>
      Loading...
    </div>

    <!-- Content -->
    <div *ngIf="prompt"
         class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8">

      <!-- Title -->
      <h1 class="text-2xl font-semibold text-gray-900 mb-6">
        {{ prompt.title }}
      </h1>

      <!-- Content Box -->
      <div class="bg-gray-50 border border-gray-200 rounded-xl p-5 text-gray-700 leading-relaxed mb-6">
        {{ prompt.content }}
      </div>

      <!-- Meta -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 text-sm">

        <div class="bg-gray-100 text-gray-700 px-4 py-2 rounded-full">
          Complexity:
          <span class="font-semibold text-gray-900 ml-1">
            {{ prompt.complexity }}
          </span>
        </div>

        <div class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full font-medium flex items-center gap-2">
          👁 Views:
          <span class="font-semibold">
            {{ prompt.view_count }}
          </span>
        </div>

      </div>

    </div>

  </div>
</div>
