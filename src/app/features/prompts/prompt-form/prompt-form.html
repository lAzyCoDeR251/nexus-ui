<div class="min-h-screen flex items-center justify-center bg-gray-100 px-6">

  <div class="w-full max-w-xl bg-white border border-gray-200 rounded-2xl shadow-lg p-8">

    <!-- Header -->
    <div class="mb-6 text-center">
      <h2 class="text-2xl font-semibold text-gray-900">Create Prompt</h2>
      <p class="text-sm text-gray-500 mt-1">Add a new prompt to your library</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

      <!-- Title -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Title
        </label>

        <input
          type="text"
          formControlName="title"
          placeholder="Enter prompt title"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-white
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
        />

        <p *ngIf="form.get('title')?.touched && form.get('title')?.invalid"
           class="text-red-500 text-xs mt-1">
          Title must be at least 3 characters
        </p>
      </div>

      <!-- Content -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Content
        </label>

        <textarea
          formControlName="content"
          rows="5"
          placeholder="Write your prompt content..."
          class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-white
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
        ></textarea>

        <p *ngIf="form.get('content')?.touched && form.get('content')?.invalid"
           class="text-red-500 text-xs mt-1">
          Content must be at least 20 characters
        </p>
      </div>

      <!-- Complexity -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Complexity (1–10)
        </label>

        <div class="relative">
          <input
            type="number"
            formControlName="complexity"
            min="1"
            max="10"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
          />

          <div class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400">
            1–10
          </div>
        </div>
      </div>

      <!-- Error -->
      <div *ngIf="errorMsg"
           class="bg-red-50 text-red-600 text-sm px-4 py-2 rounded-lg border border-red-200">
        {{ errorMsg }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-[0.99]
               transition text-white font-medium py-2.5 rounded-lg disabled:opacity-50"
      >
        {{ loading ? 'Creating...' : 'Create Prompt' }}
      </button>

    </form>

  </div>
</div>
