<div class="min-h-screen flex items-center justify-center bg-gray-100 px-6">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-gray-200 p-8">

    <!-- Header -->
    <div class="text-center mb-6">
      <h2 class="text-2xl font-semibold text-gray-900">Welcome back</h2>
      <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Username
        </label>
        <input
          type="text"
          formControlName="username"
          placeholder="Enter your username"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-gray-900 placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-gray-900 placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
        />
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-[0.99] transition
               text-white font-medium py-2.5 rounded-lg"
      >
        Login
      </button>

    </form>

    <!-- Footer -->
    <p class="text-sm text-center mt-6 text-gray-600">
      No account?
      <a routerLink="/register" class="text-indigo-600 font-medium hover:underline">
        Register
      </a>
    </p>

  </div>
</div>
