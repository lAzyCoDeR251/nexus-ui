<nav *ngIf="showNavbar" class="bg-gray-900 text-white shadow-md">

  <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">

    <!-- Logo -->
    <div class="text-lg font-semibold tracking-wide">
      Prompt Nexus
    </div>

    <!-- Desktop Menu -->
    <div class="hidden md:flex items-center gap-6 text-sm">

      <a routerLink="/prompts"
         class="hover:text-gray-300 transition">
        Prompts
      </a>

      <a routerLink="/create"
         class="hover:text-gray-300 transition">
        Create
      </a>

      <button
        (click)="logout()"
        class="bg-red-500 hover:bg-red-600 active:scale-95 transition
               px-3 py-1.5 rounded-lg text-sm font-medium">
        Logout
      </button>

    </div>

    <!-- Mobile Button -->
    <button
      class="md:hidden flex flex-col gap-1"
      (click)="mobileMenu = !mobileMenu">

      <span class="w-6 h-0.5 bg-white"></span>
      <span class="w-6 h-0.5 bg-white"></span>
      <span class="w-6 h-0.5 bg-white"></span>

    </button>

  </div>

  <!-- Mobile Menu -->
  <div *ngIf="mobileMenu"
       class="md:hidden px-6 pb-4 flex flex-col gap-3 text-sm border-t border-gray-800">

    <a routerLink="/prompts"
       class="hover:text-gray-300 transition">
      Prompts
    </a>

    <a routerLink="/create"
       class="hover:text-gray-300 transition">
      Create
    </a>

    <button
      (click)="logout()"
      class="bg-red-500 hover:bg-red-600 transition
             px-3 py-2 rounded-lg text-left">
      Logout
    </button>

  </div>

</nav>
